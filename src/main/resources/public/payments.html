<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" type="text/css" href="/index.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>포트원 결제연동</title>
    <script src="https://cdn.portone.io/v2/browser-sdk.js" async defer></script>
</head>
<body>
<div id="root">
    <dialog id="loadingDialog" open>
        <article aria-busy="true">결제 정보를 불러오는 중입니다</article>
    </dialog>
    <main id="checkoutDialog" style="display: none">
        <form id="checkoutForm">
            <article>
                <div class="productList" style="display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px;">
                </div>

                <hr>
                <div class="orderName" style="margin-bottom: 10px;">
                    <label style="font-size: 0.9rem; color: #666;">주문 상품</label>
                    <div id="orderNameDisplay" style="font-weight: bold; margin-top: 5px;"></div>
                </div>
                <div class="price">
                    <label>총 결제 금액</label>
                    <span id="totalPriceDisplay" class="price-value"></span>
                </div>
            </article>
            <button id="checkoutButton" type="submit">결제</button>
        </form>
    </main>
    <dialog id="failDialog">
        <header>
            <h1>결제 실패</h1>
        </header>
        <p id="failMessage"></p>
        <button type="button" class="closeDialog">닫기</button>
    </dialog>
    <dialog id="successDialog">
        <header>
            <h1>결제 성공</h1>
        </header>
        <p>결제에 성공했습니다</p>
        <button type="button" class="closeDialog">닫기</button>
    </dialog>
    <dialog id="virtualAccountDialog">
        <header>
            <h1>가상계좌 발급 완료</h1>
        </header>
        <p>가상계좌가 발급되었습니다</p>
        <button type="button" class="closeDialog">닫기</button>
    </dialog>
</div>
<script>
    const checkout = new Checkout(
      "store-3218fbd8-7af7-4043-8a4e-ec6e84fd858c", // 상점 ID
      "channel-key-9beb26f8-86ad-4fed-9a2d-636aa8de318c", // 채널 키
    )
    checkout.load()

    function Checkout(storeId, channelKey) {
      let orderPaymentResponse = null
      this.load = async () => {
        const waitPortOne = new Promise((resolve) => {
          const polling = setInterval(() => {
            if (window.PortOne != null) {
              clearInterval(polling)
              resolve()
            }
          }, 50)
        })

        const pathParts = window.location.pathname.split('/')
        const orderNumber = pathParts.pop() || pathParts.pop()

        const fetchOrder = async () => {
          if(!orderNumber || orderNumber === 'payments') throw new Error("주문 번호가 경로에 포함되어 있지 않습니다")
          const response = await fetch(`/api/payments/${orderNumber}`, {
            method: "GET",
            credentials: "include"
          })
          const result = await response.json()
          if (!response.ok) throw new Error("서버 응답 에러")
          orderPaymentResponse = result.data
        }

        try {
          await Promise.all([waitPortOne, fetchOrder()])
          document.getElementById("loadingDialog").open = false
          document.getElementById("checkoutDialog").style.display = "block"
          await this.showCheckout()
        } catch (error) {
          alert("결제 정보를 가져오지 못했습니다. 다시 시도해주세요")
          document.querySelector("#loafingDialog article").innerTest = "결제 정보를 불러올 수 없습니다."
        }
      }

      this.showCheckout = async () => {
        const productListContainer = document.querySelector(".productList")
        let totalAmount = 0
        let orderName = ""

        productListContainer.innerHTML = ""

        orderPaymentResponse.orderProductDtoList.forEach((product, index) => {
          totalAmount += product.price * product.count;

          if (index === 0) orderName = product.name;

          const productHtml = `
            <div class="orderProductDtoList-product" style="min-width: 120px; flex: 0 0 auto; text-align: center;">
                <img src="/${product.name}.png" style="width: 80px; height: 80px; object-fit: cover; border-radius: 4px;" />
                <h6 style="margin: 5px 0;">${product.name}</h6>
                <p style="font-size: 0.8rem;">${product.price.toLocaleString()}원 / ${product.count}개</p>
            </div>
          `
          productListContainer.insertAdjacentHTML('beforeend', productHtml)
        })

        if (orderPaymentResponse.orderProductDtoList.length > 1) {
          orderName += ` 외 ${orderPaymentResponse.orderProductDtoList.length - 1}건`
        }

        document.getElementById("orderNameDisplay").innerText = orderName;

        const finalAmount = orderPaymentResponse.totalAmount || totalAmount
        document.getElementById("totalPriceDisplay").innerText = `${finalAmount.toLocaleString()}원`

        document.getElementById("checkoutForm").onsubmit = async (e) => {
          e.preventDefault()
          this.setWaitingPayment(true)

          const payment = await PortOne.requestPayment({
            storeId,
            channelKey,
            paymentId: orderPaymentResponse.paymentId,
            orderName: orderName,
            totalAmount: finalAmount,
            currency: "KRW",
            payMethod: "CARD",
            customData: {
              orderNumber: orderPaymentResponse.orderNumber,
            },
          })

          if (payment.code != null) {
            this.setWaitingPayment(false)
            console.log(payment)
            this.openFailDialog(payment.message)
            return
          }

          const completeResponse = await fetch("/api/payments/complete", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            credentials: "include",
            body: JSON.stringify({
              paymentId: payment.paymentId,
            }),
          })
          this.setWaitingPayment(false)
          if (completeResponse.ok) {
            const result = await completeResponse.json()
            const paymentComplete = result.data
            switch (paymentComplete.status) {
              case "PAID":
                this.openSuccessDialog()
                break
              case "VIRTUAL_ACCOUNT_ISSUED":
                this.openVirtualAccountDialog()
                break
            }
          } else {
            this.openFailDialog(await completeResponse.text())
          }
        }
        for (const dialogButton of document.getElementsByClassName(
          "closeDialog",
        )) {
          dialogButton.onclick = () => {
            dialogButton.closest('dialog').open = false
          }
        }
      }

      this.setWaitingPayment = (isWaiting) => {
        window.checkoutButton.setAttribute("aria-busy", isWaiting.toString())
        window.checkoutButton.disabled = isWaiting
      }
      this.openFailDialog = (message) => {
        window.failMessage.replaceChildren(message)
        window.failDialog.open = true
      }
      this.openSuccessDialog = () => {
        window.successDialog.open = true
      }
      this.openVirtualAccountDialog = () => {
        window.virtualAccountDialog.open = true
      }
      function randomId() {
        return [...crypto.getRandomValues(new Uint32Array(2))]
          .map((word) => word.toString(16).padStart(8, "0"))
          .join("")
      }
    }
</script>
</body>
</html>
