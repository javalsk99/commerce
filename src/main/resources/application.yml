spring:
  application:
    name: commerce

  # MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${RDS_ENDPOINT}:3306/commerce?useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: ${USER_NAME}
    password: ${USER_PASSWORD}

  # JPA
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_batch_fetch_size: 100
        jdbc:
          batch_size: 100
        order_updates: true

# log
logging:
  level:
    root: info

# portone
portone:
  secret:
    api: ${API_CODE}
    webhook: ${WEBHOOK_CODE}

# jwt
jwt:
  secret: ${JWT_SECRET}

# eventListener
delay: 30

# Swagger
server:
  forward-headers-strategy: framework

springdoc:
  packages-to-scan: lsk.commerce
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    display-request-duration: true
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs